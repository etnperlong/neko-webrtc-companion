name: Release container image

on:
  push:
    tags:
      - '**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional release tag; defaults to run-<run-number>'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.event.inputs.tag || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare-tags:
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.compute.outputs.image }}
      amd64_tag: ${{ steps.compute.outputs.amd64_tag }}
      arm64_tag: ${{ steps.compute.outputs.arm64_tag }}
      manifest_tag: ${{ steps.compute.outputs.manifest_tag }}
    env:
      WORKFLOW_INPUT_TAG: ${{ github.event.inputs.tag || '' }}
    steps:
      - name: Compute image references
        id: compute
        run: |
          set -euo pipefail
          repository=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${repository}"
          tag="${WORKFLOW_INPUT_TAG}"
          if [[ -z "${tag}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              tag="${GITHUB_REF#refs/tags/}"
            else
              tag="run-${GITHUB_RUN_NUMBER}"
            fi
          fi
          raw_tag="${tag}"
          normalized_tag=$(printf '%s' "${raw_tag}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')
          if [[ -z "${normalized_tag}" ]]; then
            echo "Resolved image tag is empty after normalization" >&2
            exit 1
          fi
          if [[ "${normalized_tag}" != "${raw_tag}" ]]; then
            echo "Release tag '${raw_tag}' is not Docker-safe after normalization; use lowercase letters, digits, '.', '_' or '-' only" >&2
            exit 1
          fi
          tag="${normalized_tag}"
          amd64_tag="${tag}-amd64"
          arm64_tag="${tag}-arm64"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "amd64_tag=${amd64_tag}" >> "$GITHUB_OUTPUT"
          echo "arm64_tag=${arm64_tag}" >> "$GITHUB_OUTPUT"
          echo "manifest_tag=${tag}" >> "$GITHUB_OUTPUT"

  build-amd64:
    needs: [prepare-tags]
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      IMAGE: ${{ needs.prepare-tags.outputs.image }}
      ARCH_TAG: ${{ needs.prepare-tags.outputs.amd64_tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ env.ARCH_TAG }}

  build-arm64:
    needs: [prepare-tags]
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      IMAGE: ${{ needs.prepare-tags.outputs.image }}
      ARCH_TAG: ${{ needs.prepare-tags.outputs.arm64_tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ env.ARCH_TAG }}

  publish-manifest:
    needs: [prepare-tags, build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    env:
      IMAGE: ${{ needs.prepare-tags.outputs.image }}
      MANIFEST_TAG: ${{ needs.prepare-tags.outputs.manifest_tag }}
      AMD64_DIGEST: ${{ needs.build-amd64.outputs.digest }}
      ARM64_DIGEST: ${{ needs.build-arm64.outputs.digest }}
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish multi-arch manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE}:${MANIFEST_TAG}" \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"
      - name: Verify published manifest
        run: docker buildx imagetools inspect "${IMAGE}:${MANIFEST_TAG}"
